name: ai-research-agent
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1
  - pip:
    - docling
    - transformers
    - accelerate
    - peft
    - bitsandbytes
    - datasets
    - trl
    - unsloth
    - loguru
    - python-dotenv
    - pydantic
    - openai
    - requests
    - beautifulsoup4
